name: Publish to npm

# Plan 103 (TASK-5). Publishes the JS SDK to the PUBLIC npm registry as
# @revturbine/sdk with build provenance, on a v* release tag (pushed here by the
# source-mirror pipeline in revturbine-sdk-internal).
#
# The build bundles all @revt-eng/* deps (web-sdk tsup `noExternal`), so the
# published package is self-contained — only react/react-dom are peers.
#
# Build-time deps (@revt-eng/*, tsup, typescript) come from GitHub Packages via
# web-sdk/.npmrc + GITHUB_TOKEN. The publish itself targets npmjs with NPM_TOKEN.
#
# Requires the NPM_TOKEN secret (an automation token for the @revturbine org).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.2.13)'
        required: true

permissions:
  contents: read
  packages: read # read @revt-eng/* build deps from GitHub Packages
  id-token: write # npm provenance

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (npm registry for publish)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Authenticate GitHub Packages for every project dir
        # setup-node writes an npmjs-only auth line into NPM_CONFIG_USERCONFIG. The
        # GitHub Packages token lives in the repo-root .npmrc — but the web-sdk
        # install below runs with `working-directory: web-sdk`, so pnpm treats
        # web-sdk as the project root and reads web-sdk/.npmrc (registry mapping
        # only, no token) instead. That install then 401s on @revt-eng/*, which is
        # how v0.2.25 and v0.2.26 both failed to publish while their PyPI
        # counterparts shipped. web-sdk/ is mirror-owned by
        # revturbine-sdk-internal, so the token line cannot be added there from
        # here; writing it into the user config applies it no matter which
        # directory pnpm runs in. The value is an env placeholder, not a secret —
        # NODE_AUTH_TOKEN is supplied per-step below.
        run: |
          echo '@revt-eng:registry=https://npm.pkg.github.com' >> "$NPM_CONFIG_USERCONFIG"
          echo '//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}' >> "$NPM_CONFIG_USERCONFIG"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${TAG#v}"

      - name: Sync root @revt-eng/* pins from web-sdk (prevents hoist drift)
        # web-sdk is mirror-synced from revturbine-sdk-internal; the root manifest
        # is public-owned and drifts. Derive the root pins from web-sdk before the
        # root install so the hoisted @revt-eng/* can never lag what the SDK builds
        # against. See scripts/sync-root-pins.mjs (revt-eng/revturbine-sdk#14).
        run: node scripts/sync-root-pins.mjs

      - name: Install root deps (hoists @revt-eng/* so ../server-node resolves them)
        # tsup bundles web-sdk's headless entry, which imports ../server-node, which
        # imports @revt-eng/core — resolved by walking up to the repo-root
        # node_modules. Without this root install those imports fail to resolve.
        run: pnpm install --no-frozen-lockfile --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install web-sdk build deps (@revt-eng/* from GitHub Packages)
        working-directory: web-sdk
        run: pnpm install --no-frozen-lockfile --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build SDK bundle (tsup + declarations)
        # Invoke the build directly — `pnpm build` would fire the prebuild hook,
        # which references internal-only ../scripts that are not in the public repo.
        #
        # Call the binaries out of node_modules/.bin rather than through
        # `pnpm exec`. web-sdk/package.json pins pnpm@11, whose `exec` first
        # verifies the lockfile against the supply-chain (minimum-release-age)
        # policy and re-runs `pnpm install` when that check trips — which it does
        # here, because the @revt-eng/* pins are always fresher than the age gate.
        # The deps are already installed by the step above, so that implicit
        # install is pure risk. NODE_AUTH_TOKEN is supplied anyway so any pnpm
        # subprocess that does reach GitHub Packages authenticates; without it the
        # step inherits setup-node's XXXXX-XXXXX placeholder and 401s.
        working-directory: web-sdk
        run: |
          ./node_modules/.bin/tsup
          ./node_modules/.bin/tsc -p tsconfig.build.json --emitDeclarationOnly --declaration --declarationDir dist/types
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare public package manifest
        working-directory: web-sdk
        run: |
          npm pkg set name=@revturbine/sdk
          npm pkg set publishConfig.registry=https://registry.npmjs.org
          npm pkg set publishConfig.access=public
          npm pkg set repository.type=git
          npm pkg set repository.url=git+https://github.com/revt-eng/revturbine-sdk.git
          npm pkg set homepage=https://revt-eng.github.io/revturbine-sdk/
          npm pkg set bugs.url=https://github.com/revt-eng/revturbine-sdk/issues
          npm pkg set license=MIT
          # scripts reference internal-only ../scripts and ../revturbine-web; drop
          # them from the published manifest (the package ships built dist only).
          npm pkg delete scripts
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm (public, with provenance)
        working-directory: web-sdk
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
