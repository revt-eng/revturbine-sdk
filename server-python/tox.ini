[tox]
envlist = py310, py311, py312, py313, lint, type
skip_missing_interpreters = true
isolated_build = true

[testenv]
deps =
    pytest>=8.0
commands =
    pytest {posargs}

[testenv:lint]
description = ruff lint and format check
skip_install = true
deps = ruff>=0.6
commands =
    ruff check src tests
    ruff format --check src tests

[testenv:type]
description = mypy strict type-check
deps =
    mypy>=1.10
    pydantic>=2.0
commands =
    mypy
